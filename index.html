<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros 4 Meses - Kalyt y Yo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="universe-background">
        <div class="stars-container"></div>
        
        <div class="content">
            <h1 class="title">✨ 4 Meses Bajo las Estrellas ✨</h1>
            <p class="subtitle">Celebrando nuestro viaje cósmico juntos</p>
        </div>

        <div class="hours-counter">
            <div class="counter-label">Tiempo juntos</div>
            <div class="counter-display" id="counterDisplay">
                <span class="counter-item"><span class="counter-value" id="days">0</span><span class="counter-unit">D</span></span>
                <span class="counter-separator">:</span>
                <span class="counter-item"><span class="counter-value" id="hours">0</span><span class="counter-unit">H</span></span>
                <span class="counter-separator">:</span>
                <span class="counter-item"><span class="counter-value" id="minutes">0</span><span class="counter-unit">M</span></span>
                <span class="counter-separator">:</span>
                <span class="counter-item"><span class="counter-value" id="seconds">0</span><span class="counter-unit">S</span></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
